version: 1

review:
  defaultBaseRef: origin/main

scope:
  ignore:
    - "**/dist/**"
    - "**/coverage/**"
    - "**/.change-assurance/**"

verification:
  commands:
    - id: typecheck
      argv: ["pnpm", "typecheck"]
      when:
        pathsAny:
          - "**/*.ts"
          - "**/*.tsx"

    - id: test
      argv: ["pnpm", "test"]
      when:
        pathsAny:
          - "packages/**"

decision:
  requireExecutedVerificationEvidence: true
